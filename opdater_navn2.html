const tlfMap = {};
importData.forEach(m => {
  if (m.tlf && m.navn2Fornavn) tlfMap[m.tlf] = { navn2Fornavn: m.navn2Fornavn, navn2Efternavn: m.navn2Efternavn };
});

function log(msg, type) {
  const div = document.getElementById('log');
  div.innerHTML += '<div class="' + (type||'info') + '">' + msg + '</div>';
  div.scrollTop = div.scrollHeight;
}

function setProgress(i, total, label) {
  document.getElementById('progress').textContent = i + ' / ' + total + ' — ' + label;
  document.getElementById('bar').value = Math.round(i / total * 100);
}

function callAPI(data) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = function(result) {
      clearTimeout(timer);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      if (result.success) resolve(result);
      else reject(new Error(result.message || 'Fejl'));
    };
    const script = document.createElement('script');
    script.id = cbName;
    script.src = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(data)) + '&callback=' + cbName;
    script.onerror = () => { clearTimeout(timer); reject(new Error('Script fejl')); };
    document.head.appendChild(script);
  });
}

async function startOpdater() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('bar').style.display = 'block';

  log('Henter alle medlemmer...');
  let allMembers;
  try {
    const res = await callAPI({ action: 'getMembers' });
    allMembers = res.data;
    log('Fandt ' + allMembers.length + ' medlemmer', 'ok');
  } catch(e) {
    log('FEJL: ' + e.message, 'fejl');
    btn.disabled = false;
    return;
  }

  const parMembers = allMembers.filter(m => tlfMap[(m.tlf||'').replace(/\D/g,'').slice(-8)]);
  log('Skal opdatere ' + parMembers.length + ' par-medlemmer');
  log('tlfMap har ' + Object.keys(tlfMap).length + ' entries, fx: ' + Object.keys(tlfMap).slice(0,3).join(', '));
  if (allMembers.length > 0) log('Sheets tlf eksempel: "' + allMembers[0].tlf + '" → renset: "' + (allMembers[0].tlf||'').replace(/\D/g,'').slice(-8) + '"');

  let ok = 0, fejl = 0;
  for (let i = 0; i < parMembers.length; i++) {
    const m = parMembers[i];
    const tlf = (m.tlf||'').replace(/\D/g,'').slice(-8);
    const navn2 = tlfMap[tlf];
    setProgress(i + 1, parMembers.length, m.fornavn + ' ' + m.efternavn);
    try {
      await callAPI({
        action: 'updateMember',
        id: m.id,
        fornavn: m.fornavn, efternavn: m.efternavn,
        adresse: m.adresse, postnr: m.postnr, by: m.by,
        tlf: m.tlf, mail: m.mail, type: m.type, status: m.status, noter: m.noter,
        navn2Fornavn: navn2.navn2Fornavn,
        navn2Efternavn: navn2.navn2Efternavn,
      });
      ok++;
    } catch(e) {
      log('FEJL: ' + m.fornavn + ' — ' + e.message, 'fejl');
      fejl++;
    }
    await new Promise(r => setTimeout(r, 300));
  }

  setProgress(parMembers.length, parMembers.length, 'Færdig!');
  log('━━━━━━━━━━━━━━━━━━━━━━━━');
  log('✅ ' + ok + ' opdateret, ❌ ' + fejl + ' fejl', 'ok');
  btn.textContent = 'Færdig';
}
